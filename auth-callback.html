<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Duolio</title>
    <style>
      :root {
        --bg: #f8f9fb;
        --card: #ffffff;
        --line: #eaeaf0;
        --text: #1a1a1a;
        --muted: #8e8e93;
        --pink: #ff4d8d;
        --purple: #7b61ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(255, 77, 141, 0.15), transparent 32%),
          radial-gradient(circle at top right, rgba(123, 97, 255, 0.14), transparent 30%),
          var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
          "SF Pro Text", "Inter", "Segoe UI", sans-serif;
      }

      .card {
        width: min(100%, 480px);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        padding: 32px 24px 24px;
        text-align: center;
      }

      .logo {
        width: 92px;
        height: 92px;
        margin: 0 auto 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 32px;
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        margin-top: 24px;
        min-height: 56px;
        border-radius: 16px;
        border: none;
        text-decoration: none;
        color: white;
        font-weight: 700;
        font-size: 18px;
        background: linear-gradient(90deg, var(--pink), var(--purple));
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      }

      .hint {
        margin-top: 16px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <svg class="logo" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="g" x1="14" y1="14" x2="106" y2="106" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FF4D8D"/>
            <stop offset="1" stop-color="#7B61FF"/>
          </linearGradient>
        </defs>
        <path d="M32 34C32 20 45 15 53 26C58 17 71 20 80 28C87 34 88 46 82 54C76 62 67 70 53 88C39 70 30 62 24 54C18 46 20 35 32 34Z"
          stroke="url(#g)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M18 49C20 37 36 37 49 54C61 37 77 37 89 49C91 61 80 67 68 56C62 51 59 47 49 38C39 47 36 51 30 56C18 67 16 61 18 49Z"
          stroke="url(#g)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <h1>Open Duolio</h1>
      <p>
        Your password reset is ready. If the app does not open automatically,
        tap the button below.
      </p>

      <a id="open-app" class="button" href="#">Open in Duolio</a>
      <p class="hint">
        If nothing happens inside an in-app browser, open this page in Safari and try again.
      </p>
    </main>

    <script>
      (function () {
        const appBase = 'coupleswipe://login-callback/';
        const nextUrl = appBase + window.location.search + window.location.hash;
        const button = document.getElementById('open-app');
        button.href = nextUrl;

        const tryOpen = () => {
          window.location.href = nextUrl;
        };

        setTimeout(tryOpen, 120);
      })();
    </script>
  </body>
</html>
